
  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flip Store</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f1f3f6;
}

/* HEADER */
header{
  background:#2874f0;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header input{
  width:40%;
  padding:8px;
  border:none;
  border-radius:5px;
}

/* PRODUCTS */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:8px;
}

button{
  background:#2874f0;
  color:white;
  border:none;
  padding:8px;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#0b5ed7;
}

/* CART */
.cart{
  position:fixed;
  right:0;
  top:70px;
  width:300px;
  height:90%;
  background:white;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  padding:10px;
  overflow:auto;
}

.cart-item{
  border-bottom:1px solid #ddd;
  padding:10px;
}

.small-btn{
  background:red;
  padding:3px 6px;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <h2>Flip Store</h2>

  <input type="text" id="search" placeholder="Search products...">

  <div>
    🛒 <span id="cart-count">0</span>
  </div>
</header>

<!-- PRODUCTS -->
<div class="container" id="product-list"></div>

<!-- CART -->
<div class="cart">
  <h3>Your Cart</h3>
  <div id="cart-items"></div>
  <h3 id="total"></h3>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* 25 PRODUCTS */
let products = [
  {name:"Shoe 1", price:999, img:"shoe1.jpg"},
  {name:"Shoe 2", price:1099, img:"shoe2.jpg"},
  {name:"Shoe 3", price:1199, img:"shoe3.jpg"},
  {name:"Shoe 4", price:1299, img:"shoe4.jpg"},
  {name:"Shoe 5", price:1399, img:"shoe5.jpg"},

  {name:"Headphone 1", price:1499, img:"headphones1.jpg"},
  {name:"Headphone 2", price:1599, img:"headphones2.jpg"},
  {name:"Headphone 3", price:1699, img:"headphones3.jpg"},
  {name:"Headphone 4", price:1799, img:"headphones4.jpg"},
  {name:"Headphone 5", price:1899, img:"headphones5.jpg"},

  {name:"Tshirt 1", price:499, img:"tshirt1.jpg"},
  {name:"Tshirt 2", price:599, img:"tshirt2.jpg"},
  {name:"Tshirt 3", price:699, img:"tshirt3.jpg"},
  {name:"Tshirt 4", price:799, img:"tshirt4.jpg"},
  {name:"Tshirt 5", price:899, img:"tshirt5.jpg"},

  {name:"Phone 1", price:10999, img:"phone1.jpg"},
  {name:"Phone 2", price:11999, img:"phone2.jpg"},
  {name:"Phone 3", price:12999, img:"phone3.jpg"},
  {name:"Phone 4", price:13999, img:"phone4.jpg"},
  {name:"Phone 5", price:14999, img:"phone5.jpg"},

  {name:"Watch 1", price:1999, img:"watch1.jpg"},
  {name:"Watch 2", price:2199, img:"watch2.jpg"},
  {name:"Watch 3", price:2399, img:"watch3.jpg"},
  {name:"Watch 4", price:2599, img:"watch4.jpg"},
  {name:"Watch 5", price:2799, img:"watch5.jpg"}
];

/* DISPLAY PRODUCTS */
function display(list){
  let box = document.getElementById("product-list");
  box.innerHTML = "";

  list.forEach((p,i)=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>
    `;
  });
}

/* ADD TO CART */
function addToCart(i){
  let item = products[i];

  let found = cart.find(c => c.name === item.name);

  if(found){
    found.qty += 1;
  } else {
    cart.push({...item, qty:1});
  }

  saveCart();
}

/* REMOVE ITEM */
function removeItem(i){
  cart.splice(i,1);
  saveCart();
}

/* SAVE */
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

/* UPDATE CART */
function updateCart(){
  document.getElementById("cart-count").innerText = cart.length;

  let box = document.getElementById("cart-items");
  box.innerHTML = "";

  let total = 0;

  cart.forEach((item,i)=>{
    total += item.price * item.qty;

    box.innerHTML += `
      <div class="cart-item">
        <b>${item.name}</b><br>
        ₹${item.price} × ${item.qty}<br>
        <button class="small-btn" onclick="removeItem(${i})">Remove</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
  let value = this.value.toLowerCase();
  let filtered = products.filter(p => p.name.toLowerCase().includes(value));
  display(filtered);
});

/* INIT */
display(products);
updateCart();
</script>

</body>
</html>
