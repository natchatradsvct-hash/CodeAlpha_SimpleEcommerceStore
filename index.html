<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flip Store Full Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f3f6;
}

/* HEADER */
header{
  background:#2874f0;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header input{
  width:30%;
  padding:8px;
  border:none;
  border-radius:5px;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}

.tab{
  padding:6px 10px;
  background:#eee;
  border-radius:5px;
  cursor:pointer;
}

/* PRODUCTS */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

button{
  background:#2874f0;
  color:white;
  border:none;
  padding:6px;
  border-radius:5px;
  cursor:pointer;
}

/* CART */
.cart{
  position:fixed;
  right:0;
  top:60px;
  width:300px;
  height:90%;
  background:white;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  padding:10px;
  overflow:auto;
  display:none;
}

/* LOGIN */
#login{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  padding:20px;
  background:#eee;
  border-radius:10px;
}

.box input{
  display:block;
  margin:10px 0;
  padding:8px;
}

/* CHECKOUT */
#checkout{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:none;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<header>
  <h2>Flip Store Full</h2>

  <input id="search" placeholder="Search products...">

  <div>
    🛒 <span id="cart-count">0</span>
    <button onclick="toggleCart()">Cart</button>
    <button onclick="openCheckout()">Checkout</button>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <div class="tab" onclick="filter('all')">All</div>
  <div class="tab" onclick="filter('shoe')">Shoes</div>
  <div class="tab" onclick="filter('headphone')">Headphones</div>
  <div class="tab" onclick="filter('tshirt')">T-Shirts</div>
  <div class="tab" onclick="filter('phone')">Phones</div>
  <div class="tab" onclick="filter('watch')">Watches</div>
</div>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<!-- CART -->
<div class="cart" id="cartBox">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h3 id="total"></h3>
</div>

<!-- CHECKOUT -->
<div id="checkout"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* LOGIN */
function login(){
  document.getElementById("login").style.display="none";
}

/* 25 PRODUCTS */
let products = [
  {n:"Shoe 1",c:"shoe",p:999,i:"shoe1.jpg"},
  {n:"Shoe 2",c:"shoe",p:1099,i:"shoe2.jpg"},
  {n:"Shoe 3",c:"shoe",p:1199,i:"shoe3.jpg"},
  {n:"Shoe 4",c:"shoe",p:1299,i:"shoe4.jpg"},
  {n:"Shoe 5",c:"shoe",p:1399,i:"shoe5.jpg"},

  {n:"Headphone 1",c:"headphone",p:1499,i:"headphones1.jpg"},
  {n:"Headphone 2",c:"headphone",p:1599,i:"headphones2.jpg"},
  {n:"Headphone 3",c:"headphone",p:1699,i:"headphones3.jpg"},
  {n:"Headphone 4",c:"headphone",p:1799,i:"headphones4.jpg"},
  {n:"Headphone 5",c:"headphone",p:1899,i:"headphones5.jpg"},

  {n:"Tshirt 1",c:"tshirt",p:499,i:"tshirt1.jpg"},
  {n:"Tshirt 2",c:"tshirt",p:599,i:"tshirt2.jpg"},
  {n:"Tshirt 3",c:"tshirt",p:699,i:"tshirt3.jpg"},
  {n:"Tshirt 4",c:"tshirt",p:799,i:"tshirt4.jpg"},
  {n:"Tshirt 5",c:"tshirt",p:899,i:"tshirt5.jpg"},

  {n:"Phone 1",c:"phone",p:10999,i:"phone1.jpg"},
  {n:"Phone 2",c:"phone",p:11999,i:"phone2.jpg"},
  {n:"Phone 3",c:"phone",p:12999,i:"phone3.jpg"},
  {n:"Phone 4",c:"phone",p:13999,i:"phone4.jpg"},
  {n:"Phone 5",c:"phone",p:14999,i:"phone5.jpg"},

  {n:"Watch 1",c:"watch",p:1999,i:"watch1.jpg"},
  {n:"Watch 2",c:"watch",p:2199,i:"watch2.jpg"},
  {n:"Watch 3",c:"watch",p:2399,i:"watch3.jpg"},
  {n:"Watch 4",c:"watch",p:2599,i:"watch4.jpg"},
  {n:"Watch 5",c:"watch",p:2799,i:"watch5.jpg"}
];

/* DISPLAY */
function show(list){
  let box=document.getElementById("products");
  box.innerHTML="";
  list.forEach((p,i)=>{
    box.innerHTML+=`
      <div class="card">
        <img src="${p.i}">
        <h3>${p.n}</h3>
        <p>₹${p.p}</p>
        <button onclick="add(${i})">Add</button>
      </div>
    `;
  });
}

/* ADD */
function add(i){
  let item=products[i];
  let found=cart.find(c=>c.n==item.n);

  if(found) found.q++;
  else cart.push({...item,q:1});

  save();
}

/* REMOVE */
function remove(i){
  cart.splice(i,1);
  save();
}

/* SAVE */
function save(){
  localStorage.setItem("cart",JSON.stringify(cart));
  update();
}

/* UPDATE */
function update(){
  document.getElementById("cart-count").innerText=cart.length;

  let box=document.getElementById("cartItems");
  box.innerHTML="";
  let total=0;

  cart.forEach((c,i)=>{
    total+=c.p*c.q;

    box.innerHTML+=`
      <div>
        ${c.n} × ${c.q}<br>
        ₹${c.p}
        <button onclick="remove(${i})">X</button>
      </div>
      <hr>
    `;
  });

  document.getElementById("total").innerText="Total ₹"+total;
}

/* CART TOGGLE */
function toggleCart(){
  let box=document.getElementById("cartBox");
  box.style.display = box.style.display==="block"?"none":"block";
}

/* FILTER */
function filter(c){
  if(c=="all") show(products);
  else show(products.filter(p=>p.c==c));
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
  let v=e.target.value.toLowerCase();
  show(products.filter(p=>p.n.toLowerCase().includes(v)));
});

/* CHECKOUT */
function openCheckout(){
  let t=0;
  cart.forEach(c=>t+=c.p*c.q);

  document.getElementById("checkout").style.display="block";
  document.getElementById("checkout").innerHTML=`
    <h2>Checkout</h2>
    <h3>Total ₹${t}</h3>
    <button onclick="pay()">Pay Now</button>
    <button onclick="closeCheckout()">Close</button>
  `;
}

function closeCheckout(){
  document.getElementById("checkout").style.display="none";
}

/* 🎉 SUCCESS ORDER */
function pay(){
  // clear cart
  cart = [];
  localStorage.setItem("cart", JSON.stringify(cart));
  update();

  // show success screen properly
  document.getElementById("checkout").style.display = "block";

  document.getElementById("checkout").innerHTML = `
    <div style="
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:100%;
      text-align:center;
    ">
      <h1 style="color:green;">🎉 Order Successfully Placed!</h1>
      <p>Thank you for shopping with us.</p>

      <button onclick="location.reload()" style="
        padding:10px 15px;
        background:#2874f0;
        color:white;
        border:none;
        border-radius:5px;
        margin-top:10px;
      ">
        Continue Shopping
      </button>
    </div>
  `;
}

/* INIT */
show(products);
update();
</script>

</body>
</html>
