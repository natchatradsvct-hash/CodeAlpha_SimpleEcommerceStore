<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flip Store Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f3f6;
}

/* HEADER */
header{
  background:#2874f0;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header input{
  width:35%;
  padding:8px;
  border:none;
  border-radius:5px;
}

/* CATEGORY BAR */
.tabs{
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}

.tab{
  padding:8px 12px;
  background:#eee;
  border-radius:5px;
  cursor:pointer;
}

.tab:hover{
  background:#2874f0;
  color:white;
}

/* PRODUCTS */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

button{
  background:#2874f0;
  color:white;
  border:none;
  padding:6px;
  border-radius:5px;
}

/* CART */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:white;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  padding:10px;
  overflow:auto;
}

/* LOGIN */
#loginBox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login{
  padding:20px;
  background:#eee;
  border-radius:10px;
}

.login input{
  display:block;
  margin:10px 0;
  padding:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="login">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<header>
  <h2>Flip Store Pro</h2>

  <input id="search" placeholder="Search products...">

  <div>
    🛒 <span id="cart-count">0</span>
    <button onclick="openCheckout()">Checkout</button>
  </div>
</header>

<!-- CATEGORY TABS -->
<div class="tabs">
  <div class="tab" onclick="filterCat('all')">All</div>
  <div class="tab" onclick="filterCat('shoe')">Shoes</div>
  <div class="tab" onclick="filterCat('headphone')">Headphones</div>
  <div class="tab" onclick="filterCat('tshirt')">T-Shirts</div>
  <div class="tab" onclick="filterCat('phone')">Phones</div>
  <div class="tab" onclick="filterCat('watch')">Watches</div>
</div>

<!-- PRODUCTS -->
<div class="container" id="product-list"></div>

<!-- CART -->
<div class="cart">
  <h3>Cart</h3>
  <div id="cart-items"></div>
  <h3 id="total"></h3>
</div>

<!-- CHECKOUT -->
<div id="checkoutBox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; padding:20px;">
  <h2>Checkout</h2>
  <p id="checkoutTotal"></p>

  <h3>Payment</h3>
  <button onclick="pay()">Pay Now</button>
  <button onclick="closeCheckout()">Close</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* LOGIN */
function login(){
  document.getElementById("loginBox").style.display="none";
}

/* 25 PRODUCTS */
let products = [
  {name:"Shoe 1",cat:"shoe",price:999,img:"shoe1.jpg"},
  {name:"Shoe 2",cat:"shoe",price:1099,img:"shoe2.jpg"},
  {name:"Shoe 3",cat:"shoe",price:1199,img:"shoe3.jpg"},
  {name:"Shoe 4",cat:"shoe",price:1299,img:"shoe4.jpg"},
  {name:"Shoe 5",cat:"shoe",price:1399,img:"shoe5.jpg"},

  {name:"Headphone 1",cat:"headphone",price:1499,img:"headphones1.jpg"},
  {name:"Headphone 2",cat:"headphone",price:1599,img:"headphones2.jpg"},
  {name:"Headphone 3",cat:"headphone",price:1699,img:"headphones3.jpg"},
  {name:"Headphone 4",cat:"headphone",price:1799,img:"headphones4.jpg"},
  {name:"Headphone 5",cat:"headphone",price:1899,img:"headphones5.jpg"},

  {name:"Tshirt 1",cat:"tshirt",price:499,img:"tshirt1.jpg"},
  {name:"Tshirt 2",cat:"tshirt",price:599,img:"tshirt2.jpg"},
  {name:"Tshirt 3",cat:"tshirt",price:699,img:"tshirt3.jpg"},
  {name:"Tshirt 4",cat:"tshirt",price:799,img:"tshirt4.jpg"},
  {name:"Tshirt 5",cat:"tshirt",price:899,img:"tshirt5.jpg"},

  {name:"Phone 1",cat:"phone",price:10999,img:"phone1.jpg"},
  {name:"Phone 2",cat:"phone",price:11999,img:"phone2.jpg"},
  {name:"Phone 3",cat:"phone",price:12999,img:"phone3.jpg"},
  {name:"Phone 4",cat:"phone",price:13999,img:"phone4.jpg"},
  {name:"Phone 5",cat:"phone",price:14999,img:"phone5.jpg"},

  {name:"Watch 1",cat:"watch",price:1999,img:"watch1.jpg"},
  {name:"Watch 2",cat:"watch",price:2199,img:"watch2.jpg"},
  {name:"Watch 3",cat:"watch",price:2399,img:"watch3.jpg"},
  {name:"Watch 4",cat:"watch",price:2599,img:"watch4.jpg"},
  {name:"Watch 5",cat:"watch",price:2799,img:"watch5.jpg"}
];

let current = products;

/* DISPLAY */
function display(list){
  let box = document.getElementById("product-list");
  box.innerHTML="";

  list.forEach((p,i)=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${i})">Add</button>
      </div>
    `;
  });
}

/* FILTER */
function filterCat(cat){
  if(cat=="all") display(products);
  else display(products.filter(p=>p.cat==cat));
}

/* CART */
function addToCart(i){
  let item = products[i];
  let found = cart.find(c=>c.name==item.name);

  if(found) found.qty++;
  else cart.push({...item,qty:1});

  save();
}

function save(){
  localStorage.setItem("cart",JSON.stringify(cart));
  update();
}

function update(){
  document.getElementById("cart-count").innerText=cart.length;

  let box=document.getElementById("cart-items");
  box.innerHTML="";

  let total=0;

  cart.forEach((c,i)=>{
    total+=c.price*c.qty;

    box.innerHTML+=`
      <div>
        ${c.name} (x${c.qty})<br>
        ₹${c.price}
      </div>
    `;
  });

  document.getElementById("total").innerText="Total ₹"+total;
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
  let v=e.target.value.toLowerCase();
  display(products.filter(p=>p.name.toLowerCase().includes(v)));
});

/* CHECKOUT */
function openCheckout(){
  let total=0;
  cart.forEach(c=>total+=c.price*c.qty);
  document.getElementById("checkoutTotal").innerText="Pay ₹"+total;
  document.getElementById("checkoutBox").style.display="block";
}

function closeCheckout(){
  document.getElementById("checkoutBox").style.display="none";
}

function pay(){
  alert("Payment Successful (Demo)");
  cart=[];
  save();
  closeCheckout();
}

display(products);
update();
</script>

</body>
</html>
